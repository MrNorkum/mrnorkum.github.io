<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>P2P WhatsApp Tarzı Chat</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
:root{
    --bg:#0b141a;
    --panel:#111b21;
    --panel-2:#202c33;
    --panel-3:#2a3942;
    --text:#e9edef;
    --muted:#8696a0;
    --green:#00a884;
    --bubble-me:#005c4b;
    --bubble-other:#202c33;
    --danger:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:linear-gradient(135deg,#071016,#122832);color:var(--text);height:100vh;display:flex;justify-content:center;align-items:center}
.container{width:100%;max-width:760px;height:100vh;max-height:920px;background:var(--panel);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.45)}
.header{padding:14px 16px;background:var(--panel-2);display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.avatar{width:42px;height:42px;border-radius:50%;background:var(--green);display:grid;place-items:center;font-weight:700;color:#06241d}
.header-main{flex:1;min-width:0}.header-main h1{font-size:17px;font-weight:700}.header-main p{font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-bar{padding:12px;background:#0f1b22;display:grid;grid-template-columns:1fr auto auto;gap:8px}.room-bar input,.composer input{border:none;outline:none;border-radius:10px;background:var(--panel-3);color:var(--text);padding:12px}.room-bar button,.composer button,.file-label{border:none;border-radius:10px;background:var(--green);color:#06241d;font-weight:700;padding:0 14px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;min-height:42px}.room-bar button.secondary{background:#3b82f6;color:white}.room-bar button:disabled,.composer button:disabled{opacity:.5;cursor:not-allowed}
.notice{padding:8px 16px;background:#071016;color:var(--muted);font-size:13px}.notice.error{color:#fecaca;background:#3b1212}
.chat{flex:1;padding:18px 14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;background:radial-gradient(circle at top,#16242c 0,#0b141a 55%)}
.empty{margin:auto;text-align:center;color:var(--muted);max-width:360px;line-height:1.5}.msg-wrap{display:flex;flex-direction:column;max-width:78%;gap:4px}.msg-wrap.me{align-self:flex-end;align-items:flex-end}.msg-wrap.other{align-self:flex-start;align-items:flex-start}.msg{border-radius:14px;padding:9px 11px;line-height:1.35;word-break:break-word;box-shadow:0 1px 2px rgba(0,0,0,.25)}.msg-wrap.me .msg{background:var(--bubble-me)}.msg-wrap.other .msg{background:var(--bubble-other)}.meta{font-size:11px;color:#b8c4ca;margin:0 4px}.media{display:flex;flex-direction:column;gap:8px;min-width:210px}.media img,.media video{display:block;max-width:320px;max-height:320px;border-radius:10px;background:#000}.media audio{width:260px}.file-card{display:flex;gap:10px;align-items:center;padding:10px;border-radius:10px;background:rgba(255,255,255,.08)}.file-icon{width:38px;height:38px;border-radius:8px;background:#334155;display:grid;place-items:center;font-size:20px}.file-info{min-width:0;flex:1}.file-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.file-size{font-size:12px;color:#cbd5e1;margin-top:2px}.download{color:#7dd3fc;text-decoration:none;font-weight:700;font-size:13px}.preview{display:none;padding:10px 14px;background:#0f1b22;border-top:1px solid rgba(255,255,255,.06);gap:10px;align-items:center}.preview.show{display:flex}.preview span{flex:1;color:#cbd5e1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.preview button{border:none;background:transparent;color:#fecaca;font-size:22px;cursor:pointer}.composer{display:grid;grid-template-columns:auto 1fr auto;gap:8px;padding:12px;background:var(--panel-2);align-items:center}.file-label{font-size:22px;padding:0 13px}.file-label input{display:none}.drop-hint{outline:2px dashed var(--green);outline-offset:-10px}@media (max-width:560px){.container{height:100vh;max-height:none}.room-bar{grid-template-columns:1fr 1fr}.room-bar input{grid-column:1/-1}.msg-wrap{max-width:88%}.media img,.media video{max-width:250px}.composer{grid-template-columns:auto 1fr auto}.composer button{padding:0 12px}}
</style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <div class="avatar">P2P</div>
        <div class="header-main">
            <h1>Tarayıcı Bazlı Chat</h1>
            <p id="connectionInfo">Oda oluştur veya mevcut odaya katıl</p>
        </div>
    </div>

    <div class="room-bar">
        <input type="text" id="roomId" placeholder="Oda ID" autocomplete="off" />
        <button class="secondary" onclick="createRoom()">Oluştur</button>
        <button onclick="joinRoom()">Katıl</button>
    </div>

    <div class="notice" id="status">Bağlantı bekleniyor...</div>

    <div class="chat" id="chat">
        <div class="empty" id="emptyState">Mesaj, fotoğraf, video, ses veya doküman gönderebilirsin. Dosyayı sürükleyip bu alana bırakman da yeterli.</div>
    </div>

    <div class="preview" id="preview">
        <span id="previewText"></span>
        <button onclick="clearSelectedFile()" title="Dosyayı kaldır">×</button>
    </div>

    <div class="composer">
        <label class="file-label" title="Dosya ekle">+
            <input type="file" id="fileInput" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip,.rar" />
        </label>
        <input type="text" id="message" placeholder="Mesaj yaz..." autocomplete="off" />
        <button id="sendBtn" onclick="sendCurrent()">Gönder</button>
    </div>
</div>

<script>
let peer;
let conn;
let selectedFile = null;
const MAX_FILE_SIZE = 25 * 1024 * 1024; // 25 MB

const app = document.getElementById("app");
const chat = document.getElementById("chat");
const emptyState = document.getElementById("emptyState");
const statusText = document.getElementById("status");
const connectionInfo = document.getElementById("connectionInfo");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const previewText = document.getElementById("previewText");

function randomID(){ return Math.random().toString(36).substring(2,8); }
function now(){ return new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}); }
function formatBytes(bytes){
    if(bytes < 1024) return bytes + " B";
    if(bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / (1024 * 1024)).toFixed(1) + " MB";
}
function setStatus(text, isError=false){
    statusText.textContent = text;
    statusText.className = isError ? "notice error" : "notice";
}
function clearChatEmpty(){ if(emptyState) emptyState.remove(); }
function setupConnection(connection, text){
    conn = connection;
    conn.on("open",()=>{
        setStatus(text);
        connectionInfo.textContent = "Bağlı • P2P veri kanalı açık";
    });
    conn.on("data",handleIncoming);
    conn.on("close",()=>{
        setStatus("Bağlantı kapandı.", true);
        connectionInfo.textContent = "Bağlantı kesildi";
    });
    conn.on("error",()=> setStatus("Bağlantıda hata oluştu.", true));
}
function createRoom(){
    const id = randomID();
    peer = new Peer(id);
    peer.on("open",()=>{
        document.getElementById("roomId").value = id;
        setStatus("Oda oluşturuldu: " + id + " • Karşı tarafa bu ID'yi gönder.");
        connectionInfo.textContent = "Oda açık • Kullanıcı bekleniyor";
    });
    peer.on("connection",connection=> setupConnection(connection,"Bir kullanıcı bağlandı."));
    peer.on("error",err=> setStatus("PeerJS hatası: " + err.type, true));
}
function joinRoom(){
    const room = document.getElementById("roomId").value.trim();
    if(!room) return setStatus("Lütfen Oda ID gir.", true);
    peer = new Peer();
    peer.on("open",()=> setupConnection(peer.connect(room,{reliable:true}),"Odaya bağlanıldı."));
    peer.on("error",err=> setStatus("PeerJS hatası: " + err.type, true));
}
function handleIncoming(data){
    if(typeof data === "string") addMessage({kind:"text", text:data}, "other");
    else addMessage(data, "other");
}
function addMessage(payload, type){
    clearChatEmpty();
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap " + type;
    const bubble = document.createElement("div");
    bubble.className = "msg";

    if(payload.kind === "file") bubble.appendChild(renderFile(payload));
    else bubble.textContent = payload.text || "";

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = now();
    wrap.appendChild(bubble);
    wrap.appendChild(meta);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
}
function renderFile(file){
    const box = document.createElement("div");
    box.className = "media";
    if(file.mime.startsWith("image/")){
        const img = document.createElement("img"); img.src = file.data; img.alt = file.name; box.appendChild(img);
    } else if(file.mime.startsWith("video/")){
        const video = document.createElement("video"); video.src = file.data; video.controls = true; box.appendChild(video);
    } else if(file.mime.startsWith("audio/")){
        const audio = document.createElement("audio"); audio.src = file.data; audio.controls = true; box.appendChild(audio);
    }
    const card = document.createElement("div");
    card.className = "file-card";
    card.innerHTML = `<div class="file-icon">📎</div><div class="file-info"><div class="file-name"></div><div class="file-size"></div></div>`;
    card.querySelector(".file-name").textContent = file.name;
    card.querySelector(".file-size").textContent = formatBytes(file.size || 0) + " • " + (file.mime || "dosya");
    const link = document.createElement("a");
    link.className = "download"; link.href = file.data; link.download = file.name; link.textContent = "İndir";
    card.appendChild(link);
    box.appendChild(card);
    if(file.caption){ const cap = document.createElement("div"); cap.textContent = file.caption; box.appendChild(cap); }
    return box;
}
function sendCurrent(){
    const messageInput = document.getElementById("message");
    const text = messageInput.value.trim();
    if(!conn || !conn.open) return setStatus("Önce bir odaya bağlanmalısın.", true);
    if(selectedFile) return sendFile(selectedFile, text);
    if(!text) return;
    const payload = {kind:"text", text};
    conn.send(payload);
    addMessage(payload,"me");
    messageInput.value = "";
}
function sendFile(file, caption=""){
    if(file.size > MAX_FILE_SIZE) return setStatus("Dosya çok büyük. Şimdilik üst limit 25 MB.", true);
    const reader = new FileReader();
    reader.onload = () => {
        const payload = {kind:"file", name:file.name, size:file.size, mime:file.type || "application/octet-stream", data:reader.result, caption};
        conn.send(payload);
        addMessage(payload,"me");
        document.getElementById("message").value = "";
        clearSelectedFile();
        setStatus("Dosya gönderildi: " + file.name);
    };
    reader.onerror = () => setStatus("Dosya okunamadı.", true);
    reader.readAsDataURL(file);
}
function selectFile(file){
    if(!file) return;
    if(file.size > MAX_FILE_SIZE) return setStatus("Dosya çok büyük. Şimdilik üst limit 25 MB.", true);
    selectedFile = file;
    previewText.textContent = "Eklendi: " + file.name + " • " + formatBytes(file.size);
    preview.classList.add("show");
}
function clearSelectedFile(){
    selectedFile = null;
    fileInput.value = "";
    preview.classList.remove("show");
}
fileInput.addEventListener("change",e=> selectFile(e.target.files[0]));
document.getElementById("message").addEventListener("keydown",e=>{ if(e.key === "Enter") sendCurrent(); });
["dragenter","dragover"].forEach(evt=> chat.addEventListener(evt,e=>{ e.preventDefault(); app.classList.add("drop-hint"); }));
["dragleave","drop"].forEach(evt=> chat.addEventListener(evt,e=>{ e.preventDefault(); app.classList.remove("drop-hint"); }));
chat.addEventListener("drop",e=> selectFile(e.dataTransfer.files[0]));
</script>
</body>
</html>
